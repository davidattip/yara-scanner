name: Tests

# Lance la suite de non-regression a chaque push et pull request.
on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Recuperation du code
        uses: actions/checkout@v4

      - name: Installation de Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Installation des dependances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execution des tests
        run: python -m pytest tests -v

      - name: Verification anti-faux-positifs (clean/) et detection (malicious/)
        run: |
          python scanner.py --scan test_samples/clean --no-banner
          if python scanner.py --scan test_samples/malicious --no-banner; then
            echo "ERREUR : le scan de malicious/ aurait du renvoyer un code non nul"
            exit 1
          fi
